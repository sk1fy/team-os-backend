        '201':
          $ref: '#/components/responses/DistributionEvent'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/files:
    post:
      tags: [Files]
      operationId: uploadFile
      summary: Загрузить вложение, аватар или логотип
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required: [file, purpose]
              properties:
                file:
                  type: string
                  format: binary
                purpose:
                  $ref: '#/components/schemas/FilePurpose'
