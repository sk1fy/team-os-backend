        '204':
          $ref: '#/components/responses/NoContent'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshCookie:
      type: apiKey
      in: cookie
      name: teamos_refresh
    externalSessionCookie:
      type: apiKey
      in: cookie
      name: teamos_academy_external

  headers:
    RefreshCookie:
      description: |
        HttpOnly refresh-cookie. На login/register/accept/refresh содержит ротированный
        токен; на logout истекает немедленно. В production добавляется `Secure`.
      schema:
        type: string
        example: teamos_refresh=opaque-token; Path=/api/v1/auth; HttpOnly; SameSite=Lax
    ExternalSessionCookie:
      description: Отдельная HttpOnly-cookie внешнего ученика, ограниченная публичной Академией.
      schema:
        type: string
        example: teamos_academy_external=opaque-token; Path=/api/v1/public/academy; HttpOnly; Secure; SameSite=Lax
    AcademyVisitorCookie:
      description: Анонимный first-party идентификатор аналитики; в Academy передаётся только его SHA-256 hash.
      schema:
        type: string
        example: teamos_academy_visitor=opaque-random-256-bit; Path=/api/v1/public/academy; HttpOnly; Secure; SameSite=Lax

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ID'
    InviteToken:
      name: token
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    AccessLinkToken:
      name: token
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    CourseId:
      name: courseId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ID'
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ID'
    SectionId:
      name: sectionId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ID'
    LessonId:
      name: lessonId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ID'
    LessonVersionId:
      name: lessonVersionId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ID'
    QuizVersionId:
      name: quizVersionId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ID'
    TemplateId:
      name: templateId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ID'
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    AcademyReportQuery:
      name: q
      in: query
      schema:
        type: string
    AcademyReportCourseId:
      name: courseId
      in: query
      schema:
        $ref: '#/components/schemas/ID'
    AcademyReportDepartmentId:
      name: departmentId
      in: query
      schema:
        $ref: '#/components/schemas/ID'
    AcademyReportPositionId:
      name: positionId
      in: query
      schema:
        $ref: '#/components/schemas/ID'
    AcademyReportStatus:
      name: status
      in: query
      schema:
        type: string
        enum: [not_started, in_progress, completed, overdue, frozen]
    AcademyReportSort:
      name: sort
      in: query
      schema:
        type: string
        enum: [updated_desc, updated_asc, title_asc, title_desc, deadline_asc, status]
    AccessId:
      name: accessId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ID'
    CampaignId:
      name: campaignId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ID'
    ChallengeId:
      name: challengeId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ID'
    EnrollmentId:
      name: enrollmentId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ID'
    LearnerId:
      name: learnerId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ID'
    PartnerId:
      name: partnerId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ID'
    PublicAcademyToken:
      name: token
      in: path
      required: true
      schema:
        type: string
        minLength: 32
        maxLength: 512
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
