            $ref: '#/components/schemas/FileDownload'

  schemas:
    ID:
      type: string
      format: uuid
    ISODateTime:
      type: string
      format: date-time
    LocalDate:
      type: string
      format: date
    ClearableDate:
      oneOf:
        - $ref: '#/components/schemas/LocalDate'
        - type: string
          const: ''
    ClearableDateTime:
      oneOf:
        - $ref: '#/components/schemas/ISODateTime'
        - type: string
          const: ''
    Month:
      type: string
      pattern: '^\\d{4}-(0[1-9]|1[0-2])$'
      example: '2026-07'
    LocalTime:
      type: string
      pattern: '^([01]\\d|2[0-3]):[0-5]\\d$'
      example: '09:00'
    Phone:
      type: string
      minLength: 7
      maxLength: 25
      pattern: '^\\+?[0-9() -]+$'
      description: Номер телефона с 7–15 цифрами; допустимы пробелы, скобки и дефисы.
      example: '+7 (999) 000-00-00'
    Email:
      type: string
      format: email
      pattern: '^[^@\s]+@[^@\s.]+(\.[^@\s.]+)+$'
      description: Email с полным доменным именем, включая доменную зону.
    ClearablePhone:
      oneOf:
        - $ref: '#/components/schemas/Phone'
        - type: string
          const: ''
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [message, status]
          properties:
            message:
              type: string
              minLength: 1
              example: Сотрудник не найден
            status:
              type: integer
              minimum: 400
              maximum: 599
              example: 404
    RichTextContent:
      type: object
      additionalProperties: false
      required: [type]
      properties:
        type:
          type: string
          const: doc
        content:
          type: array
          items: {}

    UserRole:
      type: string
      enum: [owner, admin, employee, partner]
    UserStatus:
      type: string
      enum: [active, invited, deactivated]
    UserSource:
      type: string
      enum: [local, amo]
      description: >-
        Источник сотрудника. Для `amo` поля email, firstName, avatarUrl, активность и lastName при
        наличии фамилии в amoCRM принадлежат amoCRM и перезаписываются при следующей синхронизации;
        остальные поля TeamOS сохраняет локально.
    InviteStatus:
      type: string
      enum: [pending, accepted, expired]
    UserAccessMode:
      type: string
      enum: [none, password, link]
      x-enum-varnames: [UserAccessModeNone, UserAccessModePassword, UserAccessModeLink]

    Company:
      type: object
      additionalProperties: false
      required: [id, name, ownerId, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          type: string
          minLength: 1
        logoUrl:
          type: string
          format: uri
        amoAccountId:
          type: string
          pattern: '^\\d+$'
        ownerId:
          $ref: '#/components/schemas/ID'
        createdAt:
          $ref: '#/components/schemas/ISODateTime'
    FilePurpose:
      type: string
      enum: [attachment, avatar, logo]
    UploadedFile:
      type: object
      additionalProperties: false
      required: [id, name, contentType, size, purpose, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          type: string
        contentType:
          type: string
        size:
          type: integer
          format: int64
          minimum: 1
        purpose:
          $ref: '#/components/schemas/FilePurpose'
        createdAt:
          $ref: '#/components/schemas/ISODateTime'
    FileDownload:
      type: object
      additionalProperties: false
      required: [file, downloadUrl]
      properties:
        file:
          $ref: '#/components/schemas/UploadedFile'
        downloadUrl:
          type: string
          format: uri

    User:
      type: object
      additionalProperties: false
      required:
        - id
        - email
        - firstName
        - lastName
        - role
        - status
        - positionIds
        - createdAt
      properties:
        id:
          $ref: '#/components/schemas/ID'
        email:
          $ref: '#/components/schemas/Email'
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
        avatarUrl:
          type: string
          format: uri
        phone:
          $ref: '#/components/schemas/Phone'
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          $ref: '#/components/schemas/UserStatus'
        source:
          $ref: '#/components/schemas/UserSource'
        accessMode:
          $ref: '#/components/schemas/UserAccessMode'
        positionIds:
          type: array
          maxItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/ID'
        birthDate:
          $ref: '#/components/schemas/LocalDate'
        hiredAt:
          $ref: '#/components/schemas/LocalDate'
        vacationAllowance:
          type: integer
          minimum: 0
          maximum: 366
        createdAt:
          $ref: '#/components/schemas/ISODateTime'

    EmployeeAccess:
      type: object
      additionalProperties: false
      required: [mode]
      properties:
        mode:
          $ref: '#/components/schemas/UserAccessMode'
        linkToken:
          type: string
          minLength: 1
        linkCreatedAt:
          $ref: '#/components/schemas/ISODateTime'

    EmployeePasswordAccess:
      type: object
      additionalProperties: false
      required: [password]
      properties:
        password:
          type: string
          minLength: 8

    EmployeeLinkAccess:
      type: object
      additionalProperties: false
      required: [token, createdAt]
      properties:
        token:
          type: string
          minLength: 1
        createdAt:
          $ref: '#/components/schemas/ISODateTime'

    Department:
      type: object
      additionalProperties: false
      required: [id, name, parentId, order]
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          type: string
          minLength: 1
        parentId:
          type: [string, 'null']
          format: uuid
          x-go-type: nullable.Nullable[string]
          x-go-type-skip-optional-pointer: true
        headUserId:
          $ref: '#/components/schemas/ID'
        valuableFinalProduct:
          type: string
        order:
          type: integer
          minimum: 0

    Position:
      type: object
      additionalProperties: false
      required: [id, name, departmentId, articleIds, requiredCourseIds]
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          type: string
          minLength: 1
        departmentId:
          $ref: '#/components/schemas/ID'
        level:
          type: integer
          minimum: 0
          maximum: 4
        description:
          type: string
        articleIds:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/ID'
        requiredCourseIds:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/ID'

    Invite:
      type: object
      additionalProperties: false
      required: [id, token, role, invitedById, status, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/ID'
        email:
          $ref: '#/components/schemas/Email'
        token:
          type: string
          minLength: 1
        role:
          $ref: '#/components/schemas/UserRole'
        positionId:
          $ref: '#/components/schemas/ID'
        departmentId:
          $ref: '#/components/schemas/ID'
        invitedById:
          $ref: '#/components/schemas/ID'
        status:
          $ref: '#/components/schemas/InviteStatus'
        createdAt:
          $ref: '#/components/schemas/ISODateTime'

    AuthResponse:
      type: object
      additionalProperties: false
      required: [accessToken, user]
      properties:
        accessToken:
          type: string
          minLength: 1
          description: JWT access-токен со сроком жизни 15 минут.
        user:
          $ref: '#/components/schemas/User'

    LoginInput:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          $ref: '#/components/schemas/Email'
        password:
          type: string
          format: password
          minLength: 8

    SetUserPasswordAccessInput:
      type: object
      additionalProperties: false
      properties:
        password:
          type: string
          format: password
          minLength: 8

    RegisterInput:
      type: object
      additionalProperties: false
      required: [companyName, email, password, firstName, lastName]
      properties:
        companyName:
          type: string
          minLength: 1
        email:
          $ref: '#/components/schemas/Email'
        password:
          type: string
          format: password
          minLength: 8
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1

    AcceptInviteInput:
      type: object
      additionalProperties: false
      required: [firstName, lastName, password]
      properties:
        email:
          $ref: '#/components/schemas/Email'
          description: Обязателен только для приглашения по ссылке без заранее заданного email.
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        password:
          type: string
          format: password
          minLength: 8

    UpdateCurrentUserInput:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        phone:
          $ref: '#/components/schemas/ClearablePhone'
        avatarUrl:
          type: string

    UpdateCompanyInput:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
        logoUrl:
          type: string
        amoAccountId:
          type: string
          pattern: '^\\d*$'

    CreateDepartmentInput:
      type: object
      additionalProperties: false
      required: [name, parentId]
      properties:
        name:
