  schemas:
    ID:
      type: string
      format: uuid
    ISODateTime:
      type: string
      format: date-time
    LocalDate:
      type: string
      format: date
    ClearableDate:
      oneOf:
        - $ref: '#/components/schemas/LocalDate'
        - type: string
          const: ''
    ClearableDateTime:
      oneOf:
        - $ref: '#/components/schemas/ISODateTime'
        - type: string
          const: ''
    Month:
      type: string
      pattern: '^\\d{4}-(0[1-9]|1[0-2])$'
      example: '2026-07'
    LocalTime:
      type: string
      pattern: '^([01]\\d|2[0-3]):[0-5]\\d$'
      example: '09:00'
    Phone:
      type: string
      minLength: 7
      maxLength: 25
      pattern: '^\\+?[0-9() -]+$'
      description: Номер телефона с 7–15 цифрами; допустимы пробелы, скобки и дефисы.
      example: '+7 (999) 000-00-00'
    Email:
      type: string
      format: email
      pattern: '^[^@\s]+@[^@\s.]+(\.[^@\s.]+)+$'
      description: Email с полным доменным именем, включая доменную зону.
    ClearablePhone:
      oneOf:
        - $ref: '#/components/schemas/Phone'
        - type: string
          const: ''
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [message, status]
          properties:
            message:
              type: string
              minLength: 1
              example: Сотрудник не найден
            status:
              type: integer
              minimum: 400
              maximum: 599
              example: 404
    RichTextContent:
      type: object
      additionalProperties: false
      required: [type]
      properties:
        type:
          type: string
          const: doc
        content:
          type: array
          items: {}

    UserRole:
      type: string
      enum: [owner, admin, employee, partner]
    UserStatus:
      type: string
      enum: [active, invited, deactivated]
    UserSource:
      type: string
      enum: [local, amo]
      description: >-
        Источник сотрудника. `amo` означает однократный импорт из amoCRM; после импорта профиль,
        статус и доступ сотрудника управляются только в TeamOS.
    InviteStatus:
      type: string
      enum: [pending, accepted, expired]
    UserAccessMode:
      type: string
      enum: [none, password, link]
      x-enum-varnames: [UserAccessModeNone, UserAccessModePassword, UserAccessModeLink]

    Company:
      type: object
      additionalProperties: false
      required: [id, name, ownerId, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          type: string
          minLength: 1
        logoUrl:
          type: string
          format: uri
        amoAccountId:
          type: string
          pattern: '^\\d+$'
        ownerId:
          $ref: '#/components/schemas/ID'
        createdAt:
          $ref: '#/components/schemas/ISODateTime'
    FilePurpose:
      type: string
      enum: [attachment, avatar, logo]
    UploadedFile:
      type: object
      additionalProperties: false
      required: [id, name, contentType, size, purpose, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/ID'
        name:
          type: string
        contentType:
          type: string
        size:
          type: integer
          format: int64
          minimum: 1
        purpose:
          $ref: '#/components/schemas/FilePurpose'
        createdAt:
          $ref: '#/components/schemas/ISODateTime'
    FileDownload:
      type: object
      additionalProperties: false
      required: [file, downloadUrl]
      properties:
        file:
          $ref: '#/components/schemas/UploadedFile'
        downloadUrl:
          type: string
          format: uri

    User:
      type: object
      additionalProperties: false
      required:
        - id
        - email
        - firstName
        - lastName
        - role
        - status
        - positionIds
        - createdAt
      properties:
        id:
          $ref: '#/components/schemas/ID'
        email:
          $ref: '#/components/schemas/Email'
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
        avatarUrl:
          type: string
          format: uri
        phone:
          $ref: '#/components/schemas/Phone'
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          $ref: '#/components/schemas/UserStatus'
        source:
          $ref: '#/components/schemas/UserSource'
        accessMode:
          $ref: '#/components/schemas/UserAccessMode'
        positionIds:
          type: array
          maxItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/ID'
        birthDate:
          $ref: '#/components/schemas/LocalDate'
        hiredAt:
          $ref: '#/components/schemas/LocalDate'
        vacationAllowance:
          type: integer
          minimum: 0
          maximum: 366
        createdAt:
          $ref: '#/components/schemas/ISODateTime'

    EmployeeAccess:
