        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDistributionGroupInput'
      responses:
        '201':
          $ref: '#/components/responses/DistributionGroup'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/distribution/groups/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [Distribution]
      operationId: updateDistributionGroup
      summary: Обновить группу распределения сделок
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDistributionGroupInput'
      responses:
        '200':
          $ref: '#/components/responses/DistributionGroup'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [Distribution]
      operationId: deleteDistributionGroup
      summary: Удалить группу и её события
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/distribution/groups/{groupId}/events:
    parameters:
      - name: groupId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/ID'
    get:
      tags: [Distribution]
      operationId: getDistributionEvents
      summary: Получить события группы, новые первыми
      responses:
        '200':
          $ref: '#/components/responses/DistributionEvents'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [Distribution]
      operationId: resetDistributionEvents
      summary: Очистить события группы
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/distribution/groups/{groupId}/simulate:
    parameters:
      - name: groupId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/ID'
    post:
      tags: [Distribution]
      operationId: simulateDistributionDeal
      summary: Смоделировать поступление сделки
      responses:
        '201':
          $ref: '#/components/responses/DistributionEvent'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/files:
    post:
      tags: [Files]
      operationId: uploadFile
      summary: Загрузить вложение, аватар или логотип
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required: [file, purpose]
              properties:
                file:
                  type: string
                  format: binary
                purpose:
                  $ref: '#/components/schemas/FilePurpose'
      responses:
        '201':
          $ref: '#/components/responses/UploadedFile'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/files/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Files]
      operationId: getFile
      summary: Получить метаданные и временную ссылку на файл
      responses:
        '200':
          $ref: '#/components/responses/FileDownload'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [Files]
      operationId: deleteFile
      summary: Удалить файл
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshCookie:
      type: apiKey
      in: cookie
      name: teamos_refresh

  headers:
    RefreshCookie:
      description: |
        HttpOnly refresh-cookie. На login/register/accept/refresh содержит ротированный
        токен; на logout истекает немедленно. В production добавляется `Secure`.
      schema:
        type: string
        example: teamos_refresh=opaque-token; Path=/api/v1/auth; HttpOnly; SameSite=Lax

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ID'
    InviteToken:
      name: token
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    AccessLinkToken:
      name: token
      in: path
      required: true
      schema:
        type: string
        minLength: 1

  responses:
    NoContent:
      description: Операция выполнена
    BadRequest:
      description: Ошибка валидации или доменный запрет
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Учётные данные отсутствуют или недействительны
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Недостаточно прав
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Сущность не найдена
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Конфликт уникальности, состояния или версии
