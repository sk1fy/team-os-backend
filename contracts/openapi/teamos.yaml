        positionId:
          $ref: '#/components/schemas/ID'
        departmentId:
          $ref: '#/components/schemas/ID'
        invitedById:
          $ref: '#/components/schemas/ID'
        status:
          $ref: '#/components/schemas/InviteStatus'
        createdAt:
          $ref: '#/components/schemas/ISODateTime'

    AuthResponse:
