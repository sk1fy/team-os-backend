openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: TeamOS Gateway API
  version: 1.0.0
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: |
    Внешний JSON/REST-контракт TeamOS. Поля и формы ответов зеркалят
    `src/api/index.ts` и `src/types/index.ts` frontend-приложения.
    Все даты-время передаются в ISO-8601, идентификаторы являются UUID.
servers:
  - url: /
    description: Gateway в текущем окружении
tags:
  - name: Auth
    description: Сессии, профиль и принятие приглашений.
  - name: Company
    description: Настройки текущей компании.
  - name: Organization
    description: Отделы, должности, сотрудники и приглашения.
  - name: Knowledge Base
    description: Разделы, статьи, версии и ознакомления.
  - name: Tasks
    description: Доски, колонки, задачи и комментарии.
  - name: Academy
    description: Курсы, уроки, тесты, назначения и прогресс.
  - name: Notifications
    description: Уведомления и SSE-доставка.
  - name: Schedule
    description: Графики работы и отклонения.
  - name: Distribution
    description: Группы и события распределения сделок.
security:
  - bearerAuth: []

paths:
  /api/v1/auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Получить текущего пользователя
      responses:
        '200':
          $ref: '#/components/responses/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags: [Auth]
      operationId: updateCurrentUser
      summary: Обновить профиль текущего пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCurrentUserInput'
      responses:
        '200':
          $ref: '#/components/responses/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Войти по email и паролю
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          $ref: '#/components/responses/AuthSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/auth/access-link/{token}:
    parameters:
      - $ref: '#/components/parameters/AccessLinkToken'
    post:
      tags: [Auth]
      operationId: loginWithAccessLink
      summary: Войти по ссылке доступа
      security: []
      responses:
        '200':
          $ref: '#/components/responses/AuthSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refresh
      summary: Ротировать refresh-сессию и выдать новый access-токен
      security:
        - refreshCookie: []
      responses:
        '200':
          $ref: '#/components/responses/AuthSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Отозвать refresh-сессию
      security:
        - refreshCookie: []
      responses:
        '204':
          description: Сессия отозвана, refresh-cookie удалена
          headers:
            Set-Cookie:
              $ref: '#/components/headers/RefreshCookie'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Создать компанию и учётную запись владельца
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          $ref: '#/components/responses/AuthSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/auth/invites/{token}:
    parameters:
      - $ref: '#/components/parameters/InviteToken'
    get:
      tags: [Auth]
      operationId: getInviteByToken
      summary: Получить ожидающее приглашение по токену
      security: []
      responses:
        '200':
          $ref: '#/components/responses/Invite'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/auth/invites/{token}/accept:
    parameters:
      - $ref: '#/components/parameters/InviteToken'
    post:
      tags: [Auth]
      operationId: acceptInvite
      summary: Принять приглашение и задать пароль
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInviteInput'
      responses:
        '200':
          $ref: '#/components/responses/AuthSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/company:
    get:
      tags: [Company]
      operationId: getCompany
      summary: Получить компанию текущего пользователя
      responses:
        '200':
          $ref: '#/components/responses/Company'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags: [Company]
      operationId: updateCompany
      summary: Обновить компанию
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCompanyInput'
      responses:
        '200':
          $ref: '#/components/responses/Company'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/org/departments:
    get:
      tags: [Organization]
      operationId: getDepartments
      summary: Получить отделы
      responses:
        '200':
          $ref: '#/components/responses/Departments'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Organization]
      operationId: createDepartment
      summary: Создать отдел
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDepartmentInput'
      responses:
        '201':
          $ref: '#/components/responses/Department'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/org/departments/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [Organization]
      operationId: updateDepartment
      summary: Обновить отдел
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDepartmentInput'
      responses:
        '200':
          $ref: '#/components/responses/Department'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [Organization]
      operationId: deleteDepartment
      summary: Удалить пустой отдел
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/org/departments/{id}/move:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Organization]
      operationId: moveDepartment
      summary: Переместить отдел
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveDepartmentInput'
      responses:
        '200':
          $ref: '#/components/responses/Department'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/org/positions:
    get:
      tags: [Organization]
      operationId: getPositions
      summary: Получить должности
      responses:
        '200':
          $ref: '#/components/responses/Positions'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Organization]
      operationId: createPosition
      summary: Создать должность
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePositionInput'
      responses:
        '201':
          $ref: '#/components/responses/Position'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/org/positions/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Organization]
      operationId: getPosition
      summary: Получить должность
      responses:
        '200':
          $ref: '#/components/responses/Position'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags: [Organization]
      operationId: updatePosition
      summary: Обновить должность, включая перенос в другой отдел
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePositionInput'
      responses:
        '200':
          $ref: '#/components/responses/Position'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [Organization]
      operationId: deletePosition
      summary: Удалить должность и снять её с сотрудников
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/org/positions/{id}/move:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Organization]
      operationId: movePosition
      summary: Переместить должность в другой отдел
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovePositionInput'
      responses:
        '200':
          $ref: '#/components/responses/Position'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/org/users:
    get:
      tags: [Organization]
      operationId: getUsers
      summary: Получить сотрудников
      responses:
        '200':
          $ref: '#/components/responses/Users'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Organization]
      operationId: createUser
      summary: Создать активного сотрудника
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserInput'
      responses:
        '201':
          $ref: '#/components/responses/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/org/users/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Organization]
      operationId: getUser
      summary: Получить сотрудника
      responses:
        '200':
          $ref: '#/components/responses/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags: [Organization]
      operationId: updateUser
      summary: Обновить сотрудника
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserInput'
      responses:
        '200':
          $ref: '#/components/responses/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [Organization]
      operationId: deleteUser
      summary: Удалить сотрудника, созданного в TeamOS
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/org/users/{id}/card:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [Organization]
      operationId: updateUserCard
      summary: Атомарно обновить карточку сотрудника и его график
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserCardInput'
      responses:
        '200':
          $ref: '#/components/responses/UserCard'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/org/users/{id}/access:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Organization]
      operationId: getUserAccess
      summary: Получить способ доступа сотрудника
      responses:
        '200':
          description: Текущий способ доступа сотрудника
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeAccess'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [Organization]
      operationId: revokeUserAccess
      summary: Полностью отозвать доступ сотрудника
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/org/users/{id}/access/password:
    parameters:
      - $ref: '#/components/parameters/Id'
    put:
      tags: [Organization]
      operationId: setUserPasswordAccess
      summary: Выдать сотруднику доступ по паролю
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetUserPasswordAccessInput'
      responses:
        '200':
          description: Пароль, показываемый только в этом ответе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeePasswordAccess'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/org/users/{id}/access/link:
    parameters:
      - $ref: '#/components/parameters/Id'
    put:
      tags: [Organization]
      operationId: setUserLinkAccess
      summary: Выдать сотруднику доступ по постоянной ссылке
      responses:
        '200':
          description: Новый токен ссылки доступа
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeLinkAccess'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/org/invites:
    get:
      tags: [Organization]
      operationId: getInvites
      summary: Получить приглашения, новые первыми
      responses:
        '200':
          $ref: '#/components/responses/Invites'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Organization]
      operationId: inviteUser
      summary: Создать приглашение по email или ссылке
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteUserInput'
      responses:
        '201':
          $ref: '#/components/responses/Invite'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/org/invites/{id}/resend:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Organization]
      operationId: resendInvite
      summary: Повторно отправить ожидающее приглашение
      responses:
        '200':
          $ref: '#/components/responses/Invite'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/org/invites/{id}/revoke:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Organization]
      operationId: revokeInvite
      summary: Отозвать приглашение
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/kb/sections:
    get:
      tags: [Knowledge Base]
      operationId: getSections
      summary: Получить разделы базы знаний
      responses:
        '200':
          $ref: '#/components/responses/ArticleSections'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Knowledge Base]
      operationId: createSection
      summary: Создать раздел базы знаний
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateArticleSectionInput'
      responses:
        '201':
          $ref: '#/components/responses/ArticleSection'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/kb/sections/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [Knowledge Base]
      operationId: updateSection
      summary: Обновить раздел базы знаний
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateArticleSectionInput'
      responses:
        '200':
          $ref: '#/components/responses/ArticleSection'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [Knowledge Base]
      operationId: deleteSection
      summary: Удалить пустой раздел базы знаний
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/kb/articles:
    get:
      tags: [Knowledge Base]
      operationId: getArticles
      summary: Получить статьи
      parameters:
        - name: sectionId
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ID'
      responses:
        '200':
          $ref: '#/components/responses/Articles'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Knowledge Base]
      operationId: createArticle
      summary: Создать статью
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateArticleInput'
      responses:
        '201':
          $ref: '#/components/responses/Article'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/public/kb/articles/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      security: []
      tags: [Knowledge Base]
      operationId: getPublicArticle
      summary: Получить опубликованную статью из публичного раздела
      responses:
        '200':
          $ref: '#/components/responses/Article'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
