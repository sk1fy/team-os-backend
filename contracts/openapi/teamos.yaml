    get:
      tags: [Schedule]
      operationId: getSchedules
      summary: Получить шаблоны графиков сотрудников
      responses:
        '200':
          $ref: '#/components/responses/UserSchedules'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/schedule/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/ID'
    put:
      tags: [Schedule]
      operationId: saveSchedule
      summary: Создать или заменить шаблон графика сотрудника
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveScheduleInput'
      responses:
        '200':
          $ref: '#/components/responses/UserSchedule'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/schedule/exceptions:
    get:
      tags: [Schedule]
      operationId: getExceptions
      summary: Получить отклонения от графика за месяц
      parameters:
        - name: month
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Month'
      responses:
        '200':
          $ref: '#/components/responses/ShiftExceptions'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    put:
      tags: [Schedule]
      operationId: saveExceptions
      summary: Пакетно сохранить отклонения от графика
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/SaveShiftExceptionInput'
      responses:
        '200':
          $ref: '#/components/responses/ShiftExceptions'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/distribution/groups:
    get:
