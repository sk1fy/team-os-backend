        '204':
          $ref: '#/components/responses/NoContent'
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/v1/notifications/stream:
    get:
      tags: [Notifications]
      operationId: streamNotifications
      summary: SSE-поток новых уведомлений
      responses:
        '200':
          description: Поток Server-Sent Events с event type `notification`.
          headers:
            Cache-Control:
              schema:
                type: string
                const: no-cache
          content:
            text/event-stream:
              schema:
                type: string
                examples:
                  - |-
                    event: notification
                    data: {"id":"4dc6f749-3490-4fba-a65b-753f747c5473"}
        '4XX':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

