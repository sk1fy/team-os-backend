      additionalProperties: false
      required: [mode]
      properties:
        mode:
          $ref: '#/components/schemas/UserAccessMode'
        linkToken:
          type: string
          minLength: 1
        linkCreatedAt:
          $ref: '#/components/schemas/ISODateTime'
        linkUrl:
          type: string
          format: uri

