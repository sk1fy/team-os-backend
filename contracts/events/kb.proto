syntax = "proto3";

package teamos.events.v1;

import "events/common.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/sk1fy/team-os-backend/contracts/gen/go/events/v1;eventsv1";

enum ArticleAudienceScope {
  ARTICLE_AUDIENCE_SCOPE_UNSPECIFIED = 0;
  ARTICLE_AUDIENCE_SCOPE_COMPANY = 1;
  ARTICLE_AUDIENCE_SCOPE_CUSTOM = 2;
}

message ArticleAudience {
  ArticleAudienceScope scope = 1;
  repeated string department_ids = 2;
  repeated string position_ids = 3;
  repeated string user_ids = 4;
}

message KbArticlePublishedEvent {
  EventMetadata metadata = 1;
  KbArticlePublishedPayload payload = 2;
}

message KbArticlePublishedPayload {
  string article_id = 1;
  string section_id = 2;
  string title = 3;
  uint32 version = 4;
  bool requires_acknowledgement = 5;
  ArticleAudience audience = 6;
}

message KbArticleUpdatedEvent {
  EventMetadata metadata = 1;
  KbArticleUpdatedPayload payload = 2;
}

message KbArticleUpdatedPayload {
  string article_id = 1;
  uint32 version = 2;
  string title = 3;
  // TipTap document JSON. HTML is never emitted.
  google.protobuf.Struct content = 4;
}

message KbArticleDeletedEvent {
  EventMetadata metadata = 1;
  KbArticleDeletedPayload payload = 2;
}

message KbArticleDeletedPayload {
  string article_id = 1;
}
