syntax = "proto3";

package teamos.events.v1;

import "events/common.proto";

option go_package = "github.com/sk1fy/team-os-backend/contracts/gen/go/events/v1;eventsv1";

// Published under teamos.company.company.created.v1 after the company owner
// and the company record have been committed to the company-service outbox.
message CompanyCreatedEvent {
  EventMetadata metadata = 1;
  CompanyCreatedPayload payload = 2;
}

message CompanyCreatedPayload {
  string company_id = 1;
  string name = 2;
  string owner_user_id = 3;
}
