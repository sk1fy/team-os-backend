syntax = "proto3";

package teamos.academy.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/sk1fy/team-os-backend/contracts/gen/go/academy/v1;academyv1";

service AcademyService {
  rpc GetCourses(GetCoursesRequest) returns (GetCoursesResponse);
  rpc GetCourse(GetCourseRequest) returns (GetCourseResponse);
  rpc GetPublicCourse(GetPublicCourseRequest) returns (GetPublicCourseResponse);
  rpc CreateCourse(CreateCourseRequest) returns (CreateCourseResponse);
  rpc CreateCourseFromKb(CreateCourseFromKbRequest) returns (CreateCourseFromKbResponse);
  rpc UpdateCourse(UpdateCourseRequest) returns (UpdateCourseResponse);
  rpc ArchiveCourse(ArchiveCourseRequest) returns (ArchiveCourseResponse);
  rpc RestoreCourse(RestoreCourseRequest) returns (RestoreCourseResponse);
  rpc DeleteCourse(DeleteCourseRequest) returns (DeleteCourseResponse);

  rpc GetCourseVersions(GetCourseVersionsRequest) returns (GetCourseVersionsResponse);
  rpc GetCourseVersion(GetCourseVersionRequest) returns (GetCourseVersionResponse);
  rpc CreateCourseDraft(CreateCourseDraftRequest) returns (CreateCourseDraftResponse);
  rpc UpdateCourseDraft(UpdateCourseDraftRequest) returns (UpdateCourseDraftResponse);
  rpc PublishCourseVersion(PublishCourseVersionRequest) returns (PublishCourseVersionResponse);
  rpc GetPublishedCourseVersion(GetPublishedCourseVersionRequest) returns (GetPublishedCourseVersionResponse);

  rpc CreateCourseVersionSection(CreateCourseVersionSectionRequest) returns (CreateCourseVersionSectionResponse);
  rpc UpdateCourseVersionSection(UpdateCourseVersionSectionRequest) returns (UpdateCourseVersionSectionResponse);
  rpc DeleteCourseVersionSection(DeleteCourseVersionSectionRequest) returns (DeleteCourseVersionSectionResponse);

  rpc CreateCourseVersionLesson(CreateCourseVersionLessonRequest) returns (CreateCourseVersionLessonResponse);
  rpc UpdateCourseVersionLesson(UpdateCourseVersionLessonRequest) returns (UpdateCourseVersionLessonResponse);
  rpc DeleteCourseVersionLesson(DeleteCourseVersionLessonRequest) returns (DeleteCourseVersionLessonResponse);
  rpc MoveCourseVersionLesson(MoveCourseVersionLessonRequest) returns (MoveCourseVersionLessonResponse);

  rpc UpsertCourseVersionQuiz(UpsertCourseVersionQuizRequest) returns (UpsertCourseVersionQuizResponse);
  rpc DeleteCourseVersionQuiz(DeleteCourseVersionQuizRequest) returns (DeleteCourseVersionQuizResponse);

  rpc GetCourseSections(GetCourseSectionsRequest) returns (GetCourseSectionsResponse);
  rpc CreateCourseSection(CreateCourseSectionRequest) returns (CreateCourseSectionResponse);
  rpc UpdateCourseSection(UpdateCourseSectionRequest) returns (UpdateCourseSectionResponse);
  rpc DeleteCourseSection(DeleteCourseSectionRequest) returns (DeleteCourseSectionResponse);

  rpc GetLessons(GetLessonsRequest) returns (GetLessonsResponse);
  rpc CreateLesson(CreateLessonRequest) returns (CreateLessonResponse);
  rpc UpdateLesson(UpdateLessonRequest) returns (UpdateLessonResponse);
  rpc DeleteLesson(DeleteLessonRequest) returns (DeleteLessonResponse);
  rpc MoveLesson(MoveLessonRequest) returns (MoveLessonResponse);

  rpc GetQuizzes(GetQuizzesRequest) returns (GetQuizzesResponse);
  rpc UpsertQuiz(UpsertQuizRequest) returns (UpsertQuizResponse);

  rpc GetAssignments(GetAssignmentsRequest) returns (GetAssignmentsResponse);
  rpc AssignCourse(AssignCourseRequest) returns (AssignCourseResponse);
  rpc RevokeAssignment(RevokeAssignmentRequest) returns (RevokeAssignmentResponse);

  rpc GetProgress(GetProgressRequest) returns (GetProgressResponse);
  rpc MarkLessonComplete(MarkLessonCompleteRequest) returns (MarkLessonCompleteResponse);

  // Enrollment is the source of truth for both internal and, in later phases,
  // external learning progress. Internal caller identity is taken from JWT by
  // the gateway/application layer and is never trusted from the request body.
  rpc GetEnrollments(GetEnrollmentsRequest) returns (GetEnrollmentsResponse);
  rpc SelfEnrollCourse(SelfEnrollCourseRequest) returns (SelfEnrollCourseResponse);
  rpc GetCatalogCourseVersion(GetCatalogCourseVersionRequest) returns (GetCatalogCourseVersionResponse);
  rpc GetEnrollment(GetEnrollmentRequest) returns (GetEnrollmentResponse);
  rpc GetEnrollmentOutline(GetEnrollmentOutlineRequest) returns (GetEnrollmentOutlineResponse);
  rpc GetEnrollmentLesson(GetEnrollmentLessonRequest) returns (GetEnrollmentLessonResponse);
  rpc ResumeEnrollment(ResumeEnrollmentRequest) returns (ResumeEnrollmentResponse);
  rpc CompleteEnrollmentLesson(CompleteEnrollmentLessonRequest) returns (CompleteEnrollmentLessonResponse);
  rpc SubmitEnrollmentQuizAttempt(SubmitEnrollmentQuizAttemptRequest) returns (SubmitEnrollmentQuizAttemptResponse);
  rpc GetEnrollmentReport(GetEnrollmentReportRequest) returns (GetEnrollmentReportResponse);

  // Partner course administration. Authorization is object-scoped: partner
  // authors can preview only their own courses, while only owner/admin can
  // apply restrictions, inspect cross-partner groups and copy originals.
  rpc GetPartnerCourseGroups(GetPartnerCourseGroupsRequest) returns (GetPartnerCourseGroupsResponse);
  rpc GetPartnerCoursesReport(GetPartnerCoursesReportRequest) returns (GetPartnerCoursesReportResponse);
  rpc GetCourseVersionPreview(GetCourseVersionPreviewRequest) returns (GetCourseVersionPreviewResponse);
  rpc SubmitCoursePreviewQuizAttempt(SubmitCoursePreviewQuizAttemptRequest) returns (SubmitCoursePreviewQuizAttemptResponse);
  rpc PausePartnerCourseDistribution(PausePartnerCourseDistributionRequest) returns (PausePartnerCourseDistributionResponse);
  rpc BlockPartnerCourse(BlockPartnerCourseRequest) returns (BlockPartnerCourseResponse);
  rpc ResolvePartnerCourseRestriction(ResolvePartnerCourseRestrictionRequest) returns (ResolvePartnerCourseRestrictionResponse);
  rpc GetCourseRestrictions(GetCourseRestrictionsRequest) returns (GetCourseRestrictionsResponse);
  rpc CopyPartnerCourseVersionToCompany(CopyPartnerCourseVersionToCompanyRequest) returns (CopyPartnerCourseVersionToCompanyResponse);

  // CourseTemplate is a separate versioned aggregate. Templates cannot be
  // assigned or learned; instantiation always creates an independent course
  // draft and the server derives its owner from the authenticated actor.
  rpc GetCourseTemplates(GetCourseTemplatesRequest) returns (GetCourseTemplatesResponse);
  rpc GetCourseTemplate(GetCourseTemplateRequest) returns (GetCourseTemplateResponse);
  rpc CreateCourseTemplate(CreateCourseTemplateRequest) returns (CreateCourseTemplateResponse);
  rpc UpdateCourseTemplateDraft(UpdateCourseTemplateDraftRequest) returns (UpdateCourseTemplateDraftResponse);
  rpc CreateCourseTemplateDraft(CreateCourseTemplateDraftRequest) returns (CreateCourseTemplateDraftResponse);
  rpc PublishCourseTemplateVersion(PublishCourseTemplateVersionRequest) returns (PublishCourseTemplateVersionResponse);
  rpc ArchiveCourseTemplate(ArchiveCourseTemplateRequest) returns (ArchiveCourseTemplateResponse);
  rpc InstantiateCourseTemplateVersion(InstantiateCourseTemplateVersionRequest) returns (InstantiateCourseTemplateVersionResponse);

  // Personal external access is created by an authenticated partner for an
  // exact immutable version of their own course. Tokens are returned only by
  // create/rotate/repeat responses and are stored by Academy only as hashes.
  rpc CreateExternalPersonalAccess(CreateExternalPersonalAccessRequest) returns (CreateExternalPersonalAccessResponse);
  rpc GetExternalPersonalAccesses(GetExternalPersonalAccessesRequest) returns (GetExternalPersonalAccessesResponse);
  rpc GetExternalPersonalAccess(GetExternalPersonalAccessRequest) returns (GetExternalPersonalAccessResponse);
  rpc ExtendExternalPersonalAccess(ExtendExternalPersonalAccessRequest) returns (ExtendExternalPersonalAccessResponse);
  rpc RotateExternalPersonalAccessToken(RotateExternalPersonalAccessTokenRequest) returns (RotateExternalPersonalAccessTokenResponse);
  rpc RevokeExternalPersonalAccess(RevokeExternalPersonalAccessRequest) returns (RevokeExternalPersonalAccessResponse);
  rpc RepeatExternalPersonalAccess(RepeatExternalPersonalAccessRequest) returns (RepeatExternalPersonalAccessResponse);

  // External campaigns are version-pinned distribution aggregates. Partner
  // campaigns are restricted to the actor's own course; company candidate
  // campaigns are restricted to owner/admin and company-owned courses.
  rpc CreateExternalCampaign(CreateExternalCampaignRequest) returns (CreateExternalCampaignResponse);
  rpc GetExternalCampaigns(GetExternalCampaignsRequest) returns (GetExternalCampaignsResponse);
  rpc GetExternalCampaign(GetExternalCampaignRequest) returns (GetExternalCampaignResponse);
  rpc PauseExternalCampaign(PauseExternalCampaignRequest) returns (PauseExternalCampaignResponse);
  rpc ResumeExternalCampaign(ResumeExternalCampaignRequest) returns (ResumeExternalCampaignResponse);
  rpc RotateExternalCampaignToken(RotateExternalCampaignTokenRequest) returns (RotateExternalCampaignTokenResponse);
  rpc RevokeExternalCampaign(RevokeExternalCampaignRequest) returns (RevokeExternalCampaignResponse);
  rpc GetExternalCampaignReport(GetExternalCampaignReportRequest) returns (GetExternalCampaignReportResponse);
  rpc GetCourseExternalReport(GetCourseExternalReportRequest) returns (GetCourseExternalReportResponse);

  // Public calls do not accept the internal TeamOS JWT. Once verification is
  // complete, the opaque external session is supplied in trusted gRPC
  // metadata by gateway and is scoped to one Academy company/learner.
  rpc GetPublicAcademyAccess(GetPublicAcademyAccessRequest) returns (GetPublicAcademyAccessResponse);
  rpc RequestPublicAcademyVerification(RequestPublicAcademyVerificationRequest) returns (RequestPublicAcademyVerificationResponse);
  rpc ConfirmPublicAcademyVerification(ConfirmPublicAcademyVerificationRequest) returns (ConfirmPublicAcademyVerificationResponse);
  rpc ActivatePublicAcademyAccess(ActivatePublicAcademyAccessRequest) returns (ActivatePublicAcademyAccessResponse);
  rpc GetPublicAcademyEnrollment(GetPublicAcademyEnrollmentRequest) returns (GetPublicAcademyEnrollmentResponse);
  rpc GetPublicAcademyEnrollmentOutline(GetPublicAcademyEnrollmentOutlineRequest) returns (GetPublicAcademyEnrollmentOutlineResponse);
  rpc GetPublicAcademyEnrollmentLesson(GetPublicAcademyEnrollmentLessonRequest) returns (GetPublicAcademyEnrollmentLessonResponse);
  rpc CompletePublicAcademyEnrollmentLesson(CompletePublicAcademyEnrollmentLessonRequest) returns (CompletePublicAcademyEnrollmentLessonResponse);
  rpc SubmitPublicAcademyQuizAttempt(SubmitPublicAcademyQuizAttemptRequest) returns (SubmitPublicAcademyQuizAttemptResponse);
  rpc GetPublicAcademyEnrollmentResults(GetPublicAcademyEnrollmentResultsRequest) returns (GetPublicAcademyEnrollmentResultsResponse);

  rpc GetExternalLearners(GetExternalLearnersRequest) returns (GetExternalLearnersResponse);
  rpc GetExternalLearner(GetExternalLearnerRequest) returns (GetExternalLearnerResponse);
  rpc GetExternalLearnerEnrollments(GetExternalLearnerEnrollmentsRequest) returns (GetExternalLearnerEnrollmentsResponse);
  rpc GetExternalLearnerTimeline(GetExternalLearnerTimelineRequest) returns (GetExternalLearnerTimelineResponse);
}

enum CourseStatus {
  COURSE_STATUS_UNSPECIFIED = 0;
  COURSE_STATUS_DRAFT = 1;
  COURSE_STATUS_PUBLISHED = 2;
}

enum CourseVisibility {
  COURSE_VISIBILITY_UNSPECIFIED = 0;
  COURSE_VISIBILITY_PUBLIC = 1;
  COURSE_VISIBILITY_COMPANY = 2;
  COURSE_VISIBILITY_RESTRICTED = 3;
}

enum CourseOwnerType {
  COURSE_OWNER_TYPE_UNSPECIFIED = 0;
  COURSE_OWNER_TYPE_COMPANY = 1;
  COURSE_OWNER_TYPE_PARTNER = 2;
}

enum CourseLifecycleStatus {
  COURSE_LIFECYCLE_STATUS_UNSPECIFIED = 0;
  COURSE_LIFECYCLE_STATUS_ACTIVE = 1;
  COURSE_LIFECYCLE_STATUS_ARCHIVED = 2;
  COURSE_LIFECYCLE_STATUS_DELETED = 3;
}

enum CourseDistributionStatus {
  COURSE_DISTRIBUTION_STATUS_UNSPECIFIED = 0;
  COURSE_DISTRIBUTION_STATUS_ACTIVE = 1;
  COURSE_DISTRIBUTION_STATUS_PAUSED = 2;
  COURSE_DISTRIBUTION_STATUS_BLOCKED = 3;
}

enum CourseOriginType {
  COURSE_ORIGIN_TYPE_UNSPECIFIED = 0;
  COURSE_ORIGIN_TYPE_PARTNER_COURSE = 1;
  COURSE_ORIGIN_TYPE_SYSTEM_TEMPLATE = 2;
  COURSE_ORIGIN_TYPE_COMPANY_TEMPLATE = 3;
}

enum CourseVersionStatus {
  COURSE_VERSION_STATUS_UNSPECIFIED = 0;
  COURSE_VERSION_STATUS_DRAFT = 1;
  COURSE_VERSION_STATUS_PUBLISHED = 2;
  COURSE_VERSION_STATUS_RETIRED = 3;
}

enum CourseLessonSourceType {
  COURSE_LESSON_SOURCE_TYPE_UNSPECIFIED = 0;
  COURSE_LESSON_SOURCE_TYPE_MANUAL = 1;
  COURSE_LESSON_SOURCE_TYPE_KB_LINK = 2;
  COURSE_LESSON_SOURCE_TYPE_KB_SNAPSHOT = 3;
  COURSE_LESSON_SOURCE_TYPE_TEMPLATE_SNAPSHOT = 4;
}

enum LessonSourceMode {
  LESSON_SOURCE_MODE_UNSPECIFIED = 0;
  LESSON_SOURCE_MODE_LINK = 1;
  LESSON_SOURCE_MODE_COPY = 2;
}

enum QuizQuestionType {
  QUIZ_QUESTION_TYPE_UNSPECIFIED = 0;
  QUIZ_QUESTION_TYPE_SINGLE = 1;
  QUIZ_QUESTION_TYPE_MULTIPLE = 2;
  QUIZ_QUESTION_TYPE_OPEN = 3;
}

enum AssigneeType {
  ASSIGNEE_TYPE_UNSPECIFIED = 0;
  ASSIGNEE_TYPE_USER = 1;
  ASSIGNEE_TYPE_POSITION = 2;
  ASSIGNEE_TYPE_DEPARTMENT = 3;
  ASSIGNEE_TYPE_EXTERNAL = 4;
}

enum CourseProgressStatus {
  COURSE_PROGRESS_STATUS_UNSPECIFIED = 0;
  COURSE_PROGRESS_STATUS_NOT_STARTED = 1;
  COURSE_PROGRESS_STATUS_IN_PROGRESS = 2;
  COURSE_PROGRESS_STATUS_COMPLETED = 3;
  COURSE_PROGRESS_STATUS_OVERDUE = 4;
}

enum EnrollmentLearnerType {
  ENROLLMENT_LEARNER_TYPE_UNSPECIFIED = 0;
  ENROLLMENT_LEARNER_TYPE_USER = 1;
  ENROLLMENT_LEARNER_TYPE_EXTERNAL = 2;
}

enum EnrollmentSourceType {
  ENROLLMENT_SOURCE_TYPE_UNSPECIFIED = 0;
  ENROLLMENT_SOURCE_TYPE_ASSIGNMENT = 1;
  ENROLLMENT_SOURCE_TYPE_PERSONAL_ACCESS = 2;
  ENROLLMENT_SOURCE_TYPE_PARTNER_PROMO_CAMPAIGN = 3;
  ENROLLMENT_SOURCE_TYPE_COMPANY_CANDIDATE_CAMPAIGN = 4;
  ENROLLMENT_SOURCE_TYPE_REPEAT_TRAINING = 5;
  ENROLLMENT_SOURCE_TYPE_LEGACY = 6;
  ENROLLMENT_SOURCE_TYPE_SELF_ENROLLMENT = 7;
}

enum EnrollmentProgressStatus {
  ENROLLMENT_PROGRESS_STATUS_UNSPECIFIED = 0;
  ENROLLMENT_PROGRESS_STATUS_NOT_STARTED = 1;
  ENROLLMENT_PROGRESS_STATUS_IN_PROGRESS = 2;
  ENROLLMENT_PROGRESS_STATUS_COMPLETED = 3;
}

enum EnrollmentAccessStatus {
  ENROLLMENT_ACCESS_STATUS_UNSPECIFIED = 0;
  ENROLLMENT_ACCESS_STATUS_INVITED = 1;
  ENROLLMENT_ACCESS_STATUS_READY = 2;
  ENROLLMENT_ACCESS_STATUS_ACTIVE = 3;
  ENROLLMENT_ACCESS_STATUS_EXPIRED = 4;
  ENROLLMENT_ACCESS_STATUS_FROZEN = 5;
  ENROLLMENT_ACCESS_STATUS_SUSPENDED = 6;
  ENROLLMENT_ACCESS_STATUS_REVOKED = 7;
  ENROLLMENT_ACCESS_STATUS_CLOSED = 8;
}

enum EnrollmentLessonStatus {
  ENROLLMENT_LESSON_STATUS_UNSPECIFIED = 0;
  ENROLLMENT_LESSON_STATUS_AVAILABLE = 1;
  ENROLLMENT_LESSON_STATUS_CURRENT = 2;
  ENROLLMENT_LESSON_STATUS_COMPLETED = 3;
}

enum CourseRestrictionType {
  COURSE_RESTRICTION_TYPE_UNSPECIFIED = 0;
  COURSE_RESTRICTION_TYPE_PAUSE = 1;
  COURSE_RESTRICTION_TYPE_BLOCK = 2;
}

enum CourseTemplateType {
  COURSE_TEMPLATE_TYPE_UNSPECIFIED = 0;
  COURSE_TEMPLATE_TYPE_SYSTEM = 1;
  COURSE_TEMPLATE_TYPE_COMPANY = 2;
}

enum CourseTemplateLifecycleStatus {
  COURSE_TEMPLATE_LIFECYCLE_STATUS_UNSPECIFIED = 0;
  COURSE_TEMPLATE_LIFECYCLE_STATUS_ACTIVE = 1;
  COURSE_TEMPLATE_LIFECYCLE_STATUS_ARCHIVED = 2;
}

enum ExternalPersonalAccessStatus {
  EXTERNAL_PERSONAL_ACCESS_STATUS_UNSPECIFIED = 0;
  EXTERNAL_PERSONAL_ACCESS_STATUS_ISSUED = 1;
  EXTERNAL_PERSONAL_ACCESS_STATUS_ACTIVATED = 2;
  EXTERNAL_PERSONAL_ACCESS_STATUS_REVOKED = 3;
  EXTERNAL_PERSONAL_ACCESS_STATUS_CLOSED = 4;
}

enum ExternalCampaignOwnerType {
  EXTERNAL_CAMPAIGN_OWNER_TYPE_UNSPECIFIED = 0;
  EXTERNAL_CAMPAIGN_OWNER_TYPE_COMPANY = 1;
  EXTERNAL_CAMPAIGN_OWNER_TYPE_PARTNER = 2;
}

enum ExternalCampaignPurpose {
  EXTERNAL_CAMPAIGN_PURPOSE_UNSPECIFIED = 0;
  EXTERNAL_CAMPAIGN_PURPOSE_COMPANY_CANDIDATE = 1;
  EXTERNAL_CAMPAIGN_PURPOSE_PARTNER_PROMO = 2;
}

enum ExternalCampaignStatus {
  EXTERNAL_CAMPAIGN_STATUS_UNSPECIFIED = 0;
  EXTERNAL_CAMPAIGN_STATUS_ACTIVE = 1;
  EXTERNAL_CAMPAIGN_STATUS_PAUSED = 2;
  EXTERNAL_CAMPAIGN_STATUS_REVOKED = 3;
  EXTERNAL_CAMPAIGN_STATUS_CLOSED = 4;
}

enum ExternalLearnerTimelineEventType {
  EXTERNAL_LEARNER_TIMELINE_EVENT_TYPE_UNSPECIFIED = 0;
  EXTERNAL_LEARNER_TIMELINE_EVENT_TYPE_ACCESS_ISSUED = 1;
  EXTERNAL_LEARNER_TIMELINE_EVENT_TYPE_VERIFICATION_REQUESTED = 2;
  EXTERNAL_LEARNER_TIMELINE_EVENT_TYPE_EMAIL_VERIFIED = 3;
  EXTERNAL_LEARNER_TIMELINE_EVENT_TYPE_ACTIVATED = 4;
  EXTERNAL_LEARNER_TIMELINE_EVENT_TYPE_LESSON_COMPLETED = 5;
  EXTERNAL_LEARNER_TIMELINE_EVENT_TYPE_QUIZ_SUBMITTED = 6;
  EXTERNAL_LEARNER_TIMELINE_EVENT_TYPE_COURSE_COMPLETED = 7;
  EXTERNAL_LEARNER_TIMELINE_EVENT_TYPE_DEADLINE_EXPIRED = 8;
  EXTERNAL_LEARNER_TIMELINE_EVENT_TYPE_ACCESS_EXTENDED = 9;
  EXTERNAL_LEARNER_TIMELINE_EVENT_TYPE_TOKEN_ROTATED = 10;
  EXTERNAL_LEARNER_TIMELINE_EVENT_TYPE_ACCESS_REVOKED = 11;
  EXTERNAL_LEARNER_TIMELINE_EVENT_TYPE_FROZEN = 12;
  EXTERNAL_LEARNER_TIMELINE_EVENT_TYPE_SUSPENDED = 13;
  EXTERNAL_LEARNER_TIMELINE_EVENT_TYPE_REPEAT_CREATED = 14;
}

enum PublicAcademyAccessKind {
  PUBLIC_ACADEMY_ACCESS_KIND_UNSPECIFIED = 0;
  PUBLIC_ACADEMY_ACCESS_KIND_PERSONAL_ACCESS = 1;
  PUBLIC_ACADEMY_ACCESS_KIND_PARTNER_PROMO_CAMPAIGN = 2;
  PUBLIC_ACADEMY_ACCESS_KIND_COMPANY_CANDIDATE_CAMPAIGN = 3;
}

message Course {
  string id = 1;
  string title = 2;
  optional string description = 3;
  optional string cover_url = 4;
  CourseStatus status = 5;
  string author_id = 6;
  bool sequential = 7;
  optional uint32 deadline_days = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  CourseVisibility visibility = 11;
  optional CourseOwnerType owner_type = 12;
  optional string owner_user_id = 13;
  optional string created_by_id = 14;
  optional CourseLifecycleStatus lifecycle_status = 15;
  optional CourseDistributionStatus distribution_status = 16;
  optional string current_draft_version_id = 17;
  optional string latest_published_version_id = 18;
}

message CourseSection {
  string id = 1;
  string course_id = 2;
  string title = 3;
  uint32 order = 4;
}

message Lesson {
  string id = 1;
  string course_id = 2;
  string section_id = 3;
  string title = 4;
  uint32 order = 5;
  google.protobuf.Struct content = 6;
  optional string source_article_id = 7;
  optional LessonSourceMode source_mode = 8;
  optional string quiz_id = 9;
}

message QuizOption {
  string id = 1;
  string text = 2;
  bool correct = 3;
}

message QuizQuestion {
  string id = 1;
  QuizQuestionType type = 2;
  string text = 3;
  repeated QuizOption options = 4;
}

message Quiz {
  string id = 1;
  string lesson_id = 2;
  repeated QuizQuestion questions = 3;
  uint32 passing_score = 4;
  optional uint32 max_attempts = 5;
}

// CourseVersion is the editor-facing immutable-version metadata. Published
// versions and their nested content must never be mutated.
message CourseVersion {
  string id = 1;
  string course_id = 2;
  uint32 number = 3;
  CourseVersionStatus status = 4;
  string title = 5;
  optional string description = 6;
  optional string cover_file_id = 7;
  optional string cover_url = 8;
  bool sequential = 9;
  optional uint32 default_internal_deadline_days = 10;
  string created_by_id = 11;
  google.protobuf.Timestamp created_at = 12;
  optional string published_by_id = 13;
  optional google.protobuf.Timestamp published_at = 14;
  optional string content_hash = 15;
}

message CourseVersionSection {
  string id = 1;
  string course_version_id = 2;
  string title = 3;
  uint32 order = 4;
}

message CourseVersionLesson {
  string id = 1;
  string course_version_id = 2;
  string section_version_id = 3;
  string stable_key = 4;
  string title = 5;
  uint32 order = 6;
  google.protobuf.Struct content = 7;
  CourseLessonSourceType source_type = 8;
  optional string source_article_id = 9;
  optional uint32 source_article_version = 10;
  optional string source_template_id = 11;
  optional string source_template_version_id = 12;
  optional uint32 estimated_minutes = 13;
  optional string quiz_version_id = 14;
}

message CourseVersionQuiz {
  string id = 1;
  string course_version_id = 2;
  string lesson_version_id = 3;
  repeated QuizQuestion questions = 4;
  uint32 passing_score = 5;
  optional uint32 max_attempts = 6;
}

// Learner quiz types intentionally omit QuizOption.correct. Never expose the
// editor-facing QuizQuestion DTO in learner/public responses.
message LearnerQuizOption {
  string id = 1;
  string text = 2;
}

message LearnerQuizQuestion {
  string id = 1;
  QuizQuestionType type = 2;
  string text = 3;
  repeated LearnerQuizOption options = 4;
}

message LearnerCourseVersionQuiz {
  string id = 1;
  repeated LearnerQuizQuestion questions = 2;
  uint32 passing_score = 3;
  optional uint32 max_attempts = 4;
}

message LearnerCourseVersionLesson {
  string id = 1;
  string course_version_id = 2;
  string section_version_id = 3;
  string stable_key = 4;
  string title = 5;
  uint32 order = 6;
  google.protobuf.Struct content = 7;
  optional uint32 estimated_minutes = 8;
  optional LearnerCourseVersionQuiz quiz = 9;
}

message LearnerCourseVersionSection {
  string id = 1;
  string title = 2;
  uint32 order = 3;
  repeated LearnerCourseVersionLesson lessons = 4;
}

message LearnerPublishedCourseVersion {
  string id = 1;
  string course_id = 2;
  uint32 number = 3;
  string title = 4;
  optional string description = 5;
  optional string cover_url = 6;
  bool sequential = 7;
  repeated LearnerCourseVersionSection sections = 8;
}

message CourseAssignment {
  string id = 1;
  string course_id = 2;
  AssigneeType assignee_type = 3;
  optional string assignee_id = 4;
  optional string invite_token = 5;
  optional google.protobuf.Timestamp due_date = 6;
  string assigned_by_id = 7;
  google.protobuf.Timestamp created_at = 8;
  // Optional while legacy assignments are backfilled. New assignments always
  // pin the published course version selected at assignment time.
  optional string course_version_id = 9;
}

message QuizAttempt {
  string id = 1;
  string quiz_id = 2;
  string user_id = 3;
  uint32 score = 4;
  bool passed = 5;
  bool pending_review = 6;
  google.protobuf.Timestamp created_at = 7;
  optional string enrollment_id = 8;
  optional string quiz_version_id = 9;
  optional uint32 attempt_number = 10;
}

message CourseProgress {
  string user_id = 1;
  string course_id = 2;
  CourseProgressStatus status = 3;
  repeated string completed_lesson_ids = 4;
  repeated QuizAttempt quiz_attempts = 5;
  optional google.protobuf.Timestamp started_at = 6;
  optional google.protobuf.Timestamp completed_at = 7;
  optional string enrollment_id = 8;
  optional string course_version_id = 9;
  optional uint32 progress_percent = 10;
  optional string current_lesson_version_id = 11;
}

message CourseEnrollment {
  string id = 1;
  string course_id = 2;
  string course_version_id = 3;
  EnrollmentLearnerType learner_type = 4;
  // Domain validation requires exactly one learner identity.
  optional string user_id = 5;
  optional string external_learner_id = 6;
  EnrollmentSourceType source_type = 7;
  optional string source_id = 8;
  uint32 attempt_number = 9;
  EnrollmentProgressStatus progress_status = 10;
  EnrollmentAccessStatus access_status = 11;
  optional string current_lesson_version_id = 12;
  optional google.protobuf.Timestamp activated_at = 13;
  optional google.protobuf.Timestamp access_until = 14;
  optional google.protobuf.Timestamp started_at = 15;
  optional google.protobuf.Timestamp completed_at = 16;
  optional google.protobuf.Timestamp last_activity_at = 17;
  optional google.protobuf.Timestamp frozen_at = 18;
  optional google.protobuf.Timestamp suspended_at = 19;
  google.protobuf.Timestamp created_at = 20;
  google.protobuf.Timestamp updated_at = 21;
  uint32 progress_percent = 22;
  // An internal assignment deadline is reporting metadata and never blocks
  // access. External access_until has different hard-expiry semantics.
  optional google.protobuf.Timestamp due_date = 23;
  bool overdue = 24;
  string company_id = 25;
  uint32 version_number = 26;
}

message EnrollmentLessonProgress {
  string enrollment_id = 1;
  string lesson_version_id = 2;
  EnrollmentLessonStatus status = 3;
  optional google.protobuf.Timestamp first_opened_at = 4;
  optional google.protobuf.Timestamp completed_at = 5;
  uint64 active_seconds = 6;
  optional google.protobuf.Struct last_position = 7;
}

message EnrollmentQuizAnswer {
  string question_id = 1;
  repeated string selected_option_ids = 2;
  optional string text = 3;
}

message EnrollmentQuizAttempt {
  string id = 1;
  string enrollment_id = 2;
  string quiz_version_id = 3;
  uint32 attempt_number = 4;
  repeated EnrollmentQuizAnswer answers = 5;
  uint32 score = 6;
  bool passed = 7;
  bool pending_review = 8;
  optional string reviewed_by_id = 9;
  optional google.protobuf.Timestamp reviewed_at = 10;
  optional string review_comment = 11;
  google.protobuf.Timestamp created_at = 12;
}

message EnrollmentOutlineLesson {
  string lesson_version_id = 1;
  string section_version_id = 2;
