syntax = "proto3";

package teamos.company.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/sk1fy/team-os-backend/contracts/gen/go/company/v1;companyv1";

// CompanyService is the internal typed boundary used by gateway and by the
// few services that need synchronous organization lookups. Authenticated
// calls receive actor/company claims through gRPC metadata.
service CompanyService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc LoginWithAccessLink(LoginWithAccessLinkRequest) returns (LoginWithAccessLinkResponse);
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc GetInviteByToken(GetInviteByTokenRequest) returns (GetInviteByTokenResponse);
  rpc AcceptInvite(AcceptInviteRequest) returns (AcceptInviteResponse);
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse);
  rpc UpdateCurrentUser(UpdateCurrentUserRequest) returns (UpdateCurrentUserResponse);
  rpc GetCompany(GetCompanyRequest) returns (GetCompanyResponse);
  rpc UpdateCompany(UpdateCompanyRequest) returns (UpdateCompanyResponse);

  rpc GetDepartments(GetDepartmentsRequest) returns (GetDepartmentsResponse);
  rpc CreateDepartment(CreateDepartmentRequest) returns (CreateDepartmentResponse);
  rpc UpdateDepartment(UpdateDepartmentRequest) returns (UpdateDepartmentResponse);
  rpc DeleteDepartment(DeleteDepartmentRequest) returns (DeleteDepartmentResponse);
  rpc MoveDepartment(MoveDepartmentRequest) returns (MoveDepartmentResponse);

  rpc GetPositions(GetPositionsRequest) returns (GetPositionsResponse);
  rpc GetPosition(GetPositionRequest) returns (GetPositionResponse);
  rpc CreatePosition(CreatePositionRequest) returns (CreatePositionResponse);
  rpc UpdatePosition(UpdatePositionRequest) returns (UpdatePositionResponse);
  rpc DeletePosition(DeletePositionRequest) returns (DeletePositionResponse);
  rpc MovePosition(MovePositionRequest) returns (MovePositionResponse);

  rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc UpdateUserCard(UpdateUserCardRequest) returns (UpdateUserCardResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc GetUserAccess(GetUserAccessRequest) returns (GetUserAccessResponse);
  rpc SetUserPasswordAccess(SetUserPasswordAccessRequest) returns (SetUserPasswordAccessResponse);
  rpc SetUserLinkAccess(SetUserLinkAccessRequest) returns (SetUserLinkAccessResponse);
  rpc RevokeUserAccess(RevokeUserAccessRequest) returns (RevokeUserAccessResponse);

  rpc GetInvites(GetInvitesRequest) returns (GetInvitesResponse);
  rpc InviteUser(InviteUserRequest) returns (InviteUserResponse);
  rpc ResendInvite(ResendInviteRequest) returns (ResendInviteResponse);
  rpc RevokeInvite(RevokeInviteRequest) returns (RevokeInviteResponse);

  rpc GetUsersByIds(GetUsersByIdsRequest) returns (GetUsersByIdsResponse);
  rpc ResolvePositionUsers(ResolvePositionUsersRequest) returns (ResolvePositionUsersResponse);
  rpc ResolveDepartmentUsers(ResolveDepartmentUsersRequest) returns (ResolveDepartmentUsersResponse);

  rpc GetSchedules(GetSchedulesRequest) returns (GetSchedulesResponse);
  rpc SaveSchedule(SaveScheduleRequest) returns (SaveScheduleResponse);
  rpc GetShiftExceptions(GetShiftExceptionsRequest) returns (GetShiftExceptionsResponse);
  rpc SaveShiftExceptions(SaveShiftExceptionsRequest) returns (SaveShiftExceptionsResponse);

  rpc GetDistributionGroups(GetDistributionGroupsRequest) returns (GetDistributionGroupsResponse);
  rpc CreateDistributionGroup(CreateDistributionGroupRequest) returns (CreateDistributionGroupResponse);
  rpc UpdateDistributionGroup(UpdateDistributionGroupRequest) returns (UpdateDistributionGroupResponse);
  rpc DeleteDistributionGroup(DeleteDistributionGroupRequest) returns (DeleteDistributionGroupResponse);
  rpc GetDistributionEvents(GetDistributionEventsRequest) returns (GetDistributionEventsResponse);
  rpc SimulateDistributionDeal(SimulateDistributionDealRequest) returns (SimulateDistributionDealResponse);
  rpc ResetDistributionEvents(ResetDistributionEventsRequest) returns (ResetDistributionEventsResponse);
}

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_OWNER = 1;
  USER_ROLE_ADMIN = 2;
  USER_ROLE_EMPLOYEE = 3;
  USER_ROLE_PARTNER = 4;
}

enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_ACTIVE = 1;
  USER_STATUS_INVITED = 2;
  USER_STATUS_DEACTIVATED = 3;
}

enum UserSource {
  USER_SOURCE_UNSPECIFIED = 0;
  USER_SOURCE_LOCAL = 1;
  USER_SOURCE_AMO = 2;
}

enum UserAccessMode {
  USER_ACCESS_MODE_UNSPECIFIED = 0;
  USER_ACCESS_MODE_NONE = 1;
  USER_ACCESS_MODE_PASSWORD = 2;
  USER_ACCESS_MODE_LINK = 3;
}

enum InviteStatus {
  INVITE_STATUS_UNSPECIFIED = 0;
  INVITE_STATUS_PENDING = 1;
  INVITE_STATUS_ACCEPTED = 2;
  INVITE_STATUS_EXPIRED = 3;
}

message Company {
  string id = 1;
  string name = 2;
  optional string logo_url = 3;
  string owner_id = 4;
  google.protobuf.Timestamp created_at = 5;
  optional string amo_account_id = 6;
}

message User {
  string id = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  optional string avatar_url = 5;
  optional string phone = 6;
  UserRole role = 7;
  UserStatus status = 8;
  // At most one item is currently allowed; repeated is kept for REST/TS compatibility.
  repeated string position_ids = 9;
  optional string birth_date = 10;
  optional string hired_at = 11;
  optional uint32 vacation_allowance = 12;
  google.protobuf.Timestamp created_at = 13;
  UserSource source = 14;
  UserAccessMode access_mode = 15;
}

message Department {
  string id = 1;
  string name = 2;
  // Absence means a root department.
  optional string parent_id = 3;
  optional string head_user_id = 4;
  optional string valuable_final_product = 5;
  uint32 order = 6;
}

message Position {
  string id = 1;
  string name = 2;
  string department_id = 3;
  optional uint32 level = 4;
  optional string description = 5;
  repeated string article_ids = 6;
  repeated string required_course_ids = 7;
}

message Invite {
  string id = 1;
  optional string email = 2;
  string token = 3;
  UserRole role = 4;
  optional string position_id = 5;
  optional string department_id = 6;
  string invited_by_id = 7;
  InviteStatus status = 8;
  google.protobuf.Timestamp created_at = 9;
}

// Refresh tokens never cross the public JSON boundary. Gateway writes the
// opaque value from this message to an HttpOnly cookie.
message AuthSession {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp refresh_expires_at = 3;
  User user = 4;
}

message RegisterRequest {
  string company_name = 1;
  string email = 2;
  string password = 3;
  string first_name = 4;
  string last_name = 5;
}

message RegisterResponse {
  AuthSession session = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  AuthSession session = 1;
}

message LoginWithAccessLinkRequest {
  string token = 1;
}

message LoginWithAccessLinkResponse {
  AuthSession session = 1;
}

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  AuthSession session = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {}

message GetInviteByTokenRequest {
  string token = 1;
}

message GetInviteByTokenResponse {
  Invite invite = 1;
}

message AcceptInviteRequest {
  string token = 1;
  string first_name = 2;
  string last_name = 3;
  string password = 4;
  // Required only when the invite was created as a link without an email.
  optional string email = 5;
}

message AcceptInviteResponse {
  AuthSession session = 1;
}

message GetCurrentUserRequest {}

message GetCurrentUserResponse {
  User user = 1;
}

message UpdateCurrentUserRequest {
  optional string first_name = 1;
  optional string last_name = 2;
  // Empty string clears the optional phone value.
  optional string phone = 3;
  reserved 4;
  reserved "avatar_url";
}

message UpdateCurrentUserResponse {
  User user = 1;
}

message GetCompanyRequest {}

message GetCompanyResponse {
  Company company = 1;
}

message UpdateCompanyRequest {
  optional string name = 1;
  // Empty string clears the logo URL.
  optional string logo_url = 2;
  // Empty string disables synchronization with amoCRM.
  optional string amo_account_id = 3;
}

message UpdateCompanyResponse {
  Company company = 1;
}

message GetDepartmentsRequest {}

message GetDepartmentsResponse {
  repeated Department departments = 1;
}

message CreateDepartmentRequest {
  string name = 1;
  // Absence means JSON null/root.
  optional string parent_id = 2;
  optional string head_user_id = 3;
  optional string valuable_final_product = 4;
}

message CreateDepartmentResponse {
  Department department = 1;
}

message UpdateDepartmentRequest {
  string id = 1;
  optional string name = 2;
  optional string head_user_id = 3;
  bool clear_head_user_id = 4;
  optional string valuable_final_product = 5;
  bool clear_valuable_final_product = 6;
}

message UpdateDepartmentResponse {
  Department department = 1;
}

message DeleteDepartmentRequest {
  string id = 1;
}

message DeleteDepartmentResponse {}

message MoveDepartmentRequest {
  string id = 1;
  // Absence means move to the root.
  optional string parent_id = 2;
}

message MoveDepartmentResponse {
  Department department = 1;
}

message GetPositionsRequest {}

message GetPositionsResponse {
  repeated Position positions = 1;
}

message GetPositionRequest {
  string id = 1;
}

message GetPositionResponse {
  Position position = 1;
}

message CreatePositionRequest {
  string name = 1;
  string department_id = 2;
  optional uint32 level = 3;
  optional string description = 4;
}

message CreatePositionResponse {
  Position position = 1;
}

message UpdatePositionRequest {
  string id = 1;
  optional string name = 2;
  optional string department_id = 3;
  optional uint32 level = 4;
  optional string description = 5;
}

message UpdatePositionResponse {
  Position position = 1;
}

message DeletePositionRequest {
  string id = 1;
}

message DeletePositionResponse {}

message MovePositionRequest {
  string id = 1;
  string department_id = 2;
}

message MovePositionResponse {
  Position position = 1;
}

message GetUsersRequest {}

message GetUsersResponse {
  repeated User users = 1;
}

message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  User user = 1;
}

message CreateUserRequest {
  string first_name = 1;
  optional string last_name = 2;
  string email = 3;
  optional string phone = 4;
  UserRole role = 5;
  repeated string position_ids = 6;
}

message CreateUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  string id = 1;
  optional string first_name = 2;
  optional string last_name = 3;
  optional string phone = 4;
  // Empty date strings clear stored dates.
  optional string birth_date = 5;
  optional string hired_at = 6;
  optional uint32 vacation_allowance = 7;
  optional UserRole role = 8;
  optional UserStatus status = 9;
  // Proto repeated fields have no presence; update_position_ids selects whether to apply it.
  repeated string position_ids = 10;
  bool update_position_ids = 11;
}

message UpdateUserResponse {
  User user = 1;
}

message DeleteUserRequest {
  string id = 1;
}

message DeleteUserResponse {}

message UserAccess {
  UserAccessMode mode = 1;
  optional string link_token = 2;
  optional google.protobuf.Timestamp link_created_at = 3;
  optional string link_url = 4;
}

message GetUserAccessRequest {
  string id = 1;
}

message GetUserAccessResponse {
  UserAccess access = 1;
}

message SetUserPasswordAccessRequest {
  string id = 1;
  optional string password = 2;
}

message SetUserPasswordAccessResponse {
  string password = 1;
}

message SetUserLinkAccessRequest {
  string id = 1;
}

message SetUserLinkAccessResponse {
  string token = 1;
  google.protobuf.Timestamp created_at = 2;
  optional string link_url = 3;
}

message RevokeUserAccessRequest {
  string id = 1;
}

message RevokeUserAccessResponse {}

message GetInvitesRequest {}

message GetInvitesResponse {
  repeated Invite invites = 1;
}

message InviteUserRequest {
  optional string email = 1;
  UserRole role = 2;
  optional string position_id = 3;
  optional string department_id = 4;
}

message InviteUserResponse {
  Invite invite = 1;
}

message ResendInviteRequest {
  string id = 1;
}

message ResendInviteResponse {
  Invite invite = 1;
}

message RevokeInviteRequest {
  string id = 1;
}

message RevokeInviteResponse {}

message GetUsersByIdsRequest {
  repeated string user_ids = 1;
}

message GetUsersByIdsResponse {
  repeated User users = 1;
}

message ResolvePositionUsersRequest {
  string position_id = 1;
}

message ResolvePositionUsersResponse {
  repeated string user_ids = 1;
}

message ResolveDepartmentUsersRequest {
  string department_id = 1;
  bool include_descendants = 2;
}

message ResolveDepartmentUsersResponse {
  repeated string user_ids = 1;
}

message ScheduleTemplate {
  string type = 1;
  repeated uint32 days = 2;
  optional uint32 on = 3;
  optional uint32 off = 4;
  string start = 5;
  string end = 6;
  optional string cycle_start = 7;
}

message UserSchedule {
  string user_id = 1;
  ScheduleTemplate template = 2;
}

enum ShiftType {
  SHIFT_TYPE_UNSPECIFIED = 0;
  SHIFT_TYPE_WORK = 1;
  SHIFT_TYPE_OFF = 2;
  SHIFT_TYPE_VACATION = 3;
  SHIFT_TYPE_SICK = 4;
  SHIFT_TYPE_TRIP = 5;
}

message ShiftException {
  string id = 1;
  string user_id = 2;
  string date = 3;
  ShiftType type = 4;
  optional string start = 5;
  optional string end = 6;
  optional string note = 7;
}

message GetSchedulesRequest {}
message GetSchedulesResponse { repeated UserSchedule schedules = 1; }
message SaveScheduleRequest { string user_id = 1; ScheduleTemplate template = 2; }
message SaveScheduleResponse { UserSchedule schedule = 1; }
message UpdateUserCardRequest {
  UpdateUserRequest user = 1;
  ScheduleTemplate template = 2;
}
message UpdateUserCardResponse {
  User user = 1;
  UserSchedule schedule = 2;
}
message GetShiftExceptionsRequest { string month = 1; }
message GetShiftExceptionsResponse { repeated ShiftException exceptions = 1; }
message SaveShiftExceptionInput {
  string user_id = 1;
  string date = 2;
  ShiftType type = 3;
  optional string start = 4;
  optional string end = 5;
  optional string note = 6;
}
message SaveShiftExceptionsRequest { repeated SaveShiftExceptionInput exceptions = 1; }
message SaveShiftExceptionsResponse { repeated ShiftException exceptions = 1; }

enum DistributionAlgorithm {
  DISTRIBUTION_ALGORITHM_UNSPECIFIED = 0;
  DISTRIBUTION_ALGORITHM_ROUND_ROBIN = 1;
  DISTRIBUTION_ALGORITHM_LEAST_LOADED = 2;
  DISTRIBUTION_ALGORITHM_PRIORITY = 3;
}

enum DistributionEventStatus {
  DISTRIBUTION_EVENT_STATUS_UNSPECIFIED = 0;
  DISTRIBUTION_EVENT_STATUS_ACCEPTED = 1;
  DISTRIBUTION_EVENT_STATUS_IN_PROGRESS = 2;
  DISTRIBUTION_EVENT_STATUS_REASSIGNED = 3;
  DISTRIBUTION_EVENT_STATUS_DECLINED = 4;
}

message DistributionGroup {
  string id = 1;
  string name = 2;
  optional string description = 3;
  bool active = 4;
  DistributionAlgorithm algorithm = 5;
  repeated string member_ids = 6;
  repeated string disabled_member_ids = 7;
  string source = 8;
  uint32 deal_limit = 9;
  uint32 unclaimed_minutes = 10;
  google.protobuf.Timestamp created_at = 11;
}

message DistributionEvent {
  string id = 1;
  string group_id = 2;
  uint64 deal_number = 3;
  string user_id = 4;
  DistributionEventStatus status = 5;
  google.protobuf.Timestamp created_at = 6;
}

message GetDistributionGroupsRequest {}
message GetDistributionGroupsResponse { repeated DistributionGroup groups = 1; }
message CreateDistributionGroupRequest { string name = 1; optional string description = 2; repeated string member_ids = 3; }
message CreateDistributionGroupResponse { DistributionGroup group = 1; }
message UpdateDistributionGroupRequest {
  string id = 1;
  optional string name = 2;
  optional string description = 3;
  bool clear_description = 4;
  optional bool active = 5;
  optional DistributionAlgorithm algorithm = 6;
  repeated string member_ids = 7;
  bool set_member_ids = 8;
  repeated string disabled_member_ids = 9;
  bool set_disabled_member_ids = 10;
  optional string source = 11;
  optional uint32 deal_limit = 12;
  optional uint32 unclaimed_minutes = 13;
}
message UpdateDistributionGroupResponse { DistributionGroup group = 1; }
message DeleteDistributionGroupRequest { string id = 1; }
message DeleteDistributionGroupResponse {}
message GetDistributionEventsRequest { string group_id = 1; }
message GetDistributionEventsResponse { repeated DistributionEvent events = 1; }
message SimulateDistributionDealRequest { string group_id = 1; }
message SimulateDistributionDealResponse { DistributionEvent event = 1; }
message ResetDistributionEventsRequest { string group_id = 1; }
message ResetDistributionEventsResponse {}
