version: "2"
sql:
  - engine: postgresql
    schema:
      - migrations/000001_init.up.sql
      - migrations/000002_clone_files_for_owner.up.sql
    queries: internal/storage/queries
    gen:
      go:
        package: db
        out: internal/storage/db
        sql_package: pgx/v5
        emit_interface: true
        emit_json_tags: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
