version: "2"
sql:
  - engine: postgresql
    schema:
      - migrations/000001_init.up.sql
      - migrations/000002_phase6_schedule_distribution.up.sql
      - migrations/000003_amo_users.up.sql
      - migrations/000006_employee_access.up.sql
      - migrations/000007_user_profiles_access_audit.up.sql
    queries: internal/storage/queries
    gen:
      go:
        package: db
        out: internal/storage/db
        sql_package: pgx/v5
        emit_json_tags: true
        emit_empty_slices: true
        emit_interface: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: uuid
            nullable: true
            go_type:
              import: github.com/google/uuid
              type: NullUUID
          - db_type: timestamptz
            go_type:
              import: time
              type: Time
          - db_type: date
            go_type:
              import: time
              type: Time
          - db_type: "uuid[]"
            go_type:
              import: github.com/google/uuid
              type: UUID
              slice: true
