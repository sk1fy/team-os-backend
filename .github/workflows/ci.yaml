name: Go CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  GO_VERSION: 1.25.x
  GOLANGCI_LINT_VERSION: v2.12.2
  GOWORK: "off"

jobs:
  modules:
    name: Discover Go modules
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: discover
        shell: bash
        run: |
          modules="$({ find contracts/gen/go pkg tools -maxdepth 1 -name go.mod -print; find services -mindepth 2 -maxdepth 2 -name go.mod -print; } | sed 's#/go.mod$##' | sort)"
          matrix="$(printf '%s\n' "$modules" | jq -R -s -c 'split("\n") | map(select(length > 0))')"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  test:
    name: Test ${{ matrix.module }}
    needs: modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.modules.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: Test with race detector
        working-directory: ${{ matrix.module }}
        run: go test -race ./...

  lint:
    name: Lint ${{ matrix.module }}
    needs: modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.modules.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: ${{ matrix.module }}
          args: --config=${{ github.workspace }}/.golangci.yaml ./...

  govulncheck:
    name: Vulncheck ${{ matrix.module }}
    needs: modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.modules.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
      - name: Scan module
        working-directory: ${{ matrix.module }}
        run: govulncheck ./...

  integration:
    name: Integration ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [academy, kb, tasks]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/${{ matrix.service }}/go.sum
      - name: Test against PostgreSQL
        working-directory: services/${{ matrix.service }}
        run: go test -tags integration ./internal/application -count=1

  changed-services:
    name: Discover changed services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        shell: bash
        run: |
          empty_tree=4b825dc642cb6eb9a060e54bf8d69288fbee4904
          base="$BASE_SHA"
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$empty_tree"
          fi
          changed="$(git diff --name-only "$base" "$GITHUB_SHA")"
          global=false
          if grep -Eq '^(pkg/|contracts/|go\.work|Makefile|\.golangci\.yaml|\.github/workflows/ci\.yaml)' <<<"$changed"; then
            global=true
          fi

          services=()
          for module in services/*/go.mod; do
            [[ -f "$module" ]] || continue
            service="${module#services/}"
            service="${service%/go.mod}"
            if [[ "$global" == true ]] || grep -q "^services/$service/" <<<"$changed"; then
              services+=("$service")
            fi
          done
          matrix="$(printf '%s\n' "${services[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  e2e:
    name: E2E smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate production Compose security
        run: make check-production-compose
      - name: Start development stack
        run: make up
      - name: Apply migrations
        run: make migrate
      - name: Wait for gateway readiness
        run: curl --retry 60 --retry-delay 2 --retry-all-errors --fail --silent --output /dev/null http://localhost:8080/readyz
      - name: Run smoke scenario
        run: make e2e
      - name: Dump service logs on failure
        if: failure()
        run: docker compose --file deploy/docker-compose.yaml logs --tail 200
      - name: Stop stack
        if: always()
        run: make down

  service-images:
    name: Build ${{ matrix.service }} image
    needs: changed-services
    if: needs.changed-services.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changed-services.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: metadata
        with:
          images: ghcr.io/${{ github.repository_owner }}/teamos-${{ matrix.service }}
          tags: |
            type=sha
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build and optionally publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
