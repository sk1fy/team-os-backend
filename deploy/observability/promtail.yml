server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /teamos-(gateway|company|kb|tasks|academy|notifications|files)-.*
        action: keep
      - source_labels: [__meta_docker_container_name]
        regex: /teamos-([^-]+)-.*
        target_label: service_name
      - source_labels: [__meta_docker_container_id]
        target_label: container_id
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
            trace_id: trace_id
            company_id: company_id
            user_id: user_id
      - labels:
          level:
          trace_id:
      - structured_metadata:
          company_id:
          user_id:
