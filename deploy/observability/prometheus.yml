global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: teamos

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: teamos
    metrics_path: /metrics
    static_configs:
      - targets:
          - "gateway:8080"
          - "company:8081"
          - "kb:8082"
          - "tasks:8083"
          - "academy:8084"
          - "notifications:8085"
          - "files:8086"
        labels:
          environment: development
    relabel_configs:
      - source_labels: [__address__]
        regex: "([^:]+):.*"
        replacement: "$1"
        target_label: service_name

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
