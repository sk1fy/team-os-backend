name: teamos

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-teamos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamos}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/01-init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    ports:
      - "4222:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  nats-init:
    image: natsio/nats-box:0.19.7
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        nats --server nats://nats:4222 stream info TEAMOS >/dev/null 2>&1 ||
          nats --server nats://nats:4222 stream add TEAMOS \
            --subjects 'teamos.>' \
            --storage file \
            --retention limits \
            --discard old \
            --max-bytes 1GB \
            --max-age 720h \
            --replicas 1 \
            --defaults
    depends_on:
      nats:
        condition: service_healthy
    restart: "no"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-teamos-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-teamos-minio-secret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  company-migrate:
    image: migrate/migrate:v4.19.1
    command:
      - -path=/migrations
      - -database=postgres://${POSTGRES_USER:-teamos}:${POSTGRES_PASSWORD:-teamos}@postgres:5432/teamos_company?sslmode=disable
      - up
    volumes:
      - ../services/company/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  kb-migrate:
    image: migrate/migrate:v4.19.1
    command:
      - -path=/migrations
      - -database=postgres://${POSTGRES_USER:-teamos}:${POSTGRES_PASSWORD:-teamos}@postgres:5432/teamos_kb?sslmode=disable
      - up
    volumes:
      - ../services/kb/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  tasks-migrate:
    image: migrate/migrate:v4.19.1
    command:
      - -path=/migrations
      - -database=postgres://${POSTGRES_USER:-teamos}:${POSTGRES_PASSWORD:-teamos}@postgres:5432/teamos_tasks?sslmode=disable
      - up
    volumes:
      - ../services/tasks/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  academy-migrate:
    image: migrate/migrate:v4.19.1
    command:
      - -path=/migrations
      - -database=postgres://${POSTGRES_USER:-teamos}:${POSTGRES_PASSWORD:-teamos}@postgres:5432/teamos_academy?sslmode=disable
      - up
    volumes:
      - ../services/academy/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  notifications-migrate:
    image: migrate/migrate:v4.19.1
    command: ["-path=/migrations", "-database=postgres://${POSTGRES_USER:-teamos}:${POSTGRES_PASSWORD:-teamos}@postgres:5432/teamos_notifications?sslmode=disable", "up"]
    volumes:
      - ../services/notifications/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  files-migrate:
    image: migrate/migrate:v4.19.1
    command: ["-path=/migrations", "-database=postgres://${POSTGRES_USER:-teamos}:${POSTGRES_PASSWORD:-teamos}@postgres:5432/teamos_files?sslmode=disable", "up"]
    volumes:
      - ../services/files/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  kb:
    build:
      context: ..
      dockerfile: services/kb/Dockerfile
    environment:
      KB_HTTP_ADDR: :8082
      KB_GRPC_ADDR: :9082
      KB_DB_URL: postgres://${POSTGRES_USER:-teamos}:${POSTGRES_PASSWORD:-teamos}@postgres:5432/teamos_kb?sslmode=disable
      KB_NATS_URL: nats://nats:4222
      KB_JWT_PUBLIC_KEY: ${GATEWAY_JWT_PUBLIC_KEY:-development-key-not-generated}
      KB_JWT_ISSUER: ${COMPANY_JWT_ISSUER:-teamos-company}
      KB_JWT_AUDIENCE: ${COMPANY_JWT_AUDIENCE:-teamos-api}
      KB_SHUTDOWN_TIMEOUT: ${KB_SHUTDOWN_TIMEOUT:-30s}
    ports:
      - "8082:8082"
      - "127.0.0.1:9082:9082"
    depends_on:
      kb-migrate:
        condition: service_completed_successfully
      nats-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/kb", "healthcheck", "http://127.0.0.1:8082/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
    stop_grace_period: 30s
    init: true

  company:
    build:
      context: ..
      dockerfile: services/company/Dockerfile
    environment:
      COMPANY_HTTP_ADDR: :8081
      COMPANY_GRPC_ADDR: :9081
      COMPANY_DB_URL: postgres://${POSTGRES_USER:-teamos}:${POSTGRES_PASSWORD:-teamos}@postgres:5432/teamos_company?sslmode=disable
      COMPANY_NATS_URL: nats://nats:4222
      COMPANY_JWT_PRIVATE_KEY: ${COMPANY_JWT_PRIVATE_KEY:-development-key-not-generated}
      COMPANY_JWT_ISSUER: ${COMPANY_JWT_ISSUER:-teamos-company}
      COMPANY_JWT_AUDIENCE: ${COMPANY_JWT_AUDIENCE:-teamos-api}
      COMPANY_ACCESS_TTL: ${COMPANY_ACCESS_TTL:-15m}
      COMPANY_SHUTDOWN_TIMEOUT: ${COMPANY_SHUTDOWN_TIMEOUT:-30s}
      EXTERNAL_API_URL: ${EXTERNAL_API_URL:-https://ssd.rkrs.ru/api/v1/rkrs_activity/getEmployee}
      APP_NAME: ${APP_NAME:-rkrs_activity}
      EXTERNAL_API_TIMEOUT: ${EXTERNAL_API_TIMEOUT:-10}
      COMPANY_AMO_SYNC_INTERVAL: ${COMPANY_AMO_SYNC_INTERVAL:-5m}
      COMPANY_AMO_IMPORT_ENABLED: ${COMPANY_AMO_IMPORT_ENABLED:-false}
    ports:
      - "8081:8081"
      - "127.0.0.1:9081:9081"
    depends_on:
      company-migrate:
        condition: service_completed_successfully
      nats-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/company", "healthcheck", "http://127.0.0.1:8081/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
    stop_grace_period: 30s
    init: true

  tasks:
    build:
      context: ..
      dockerfile: services/tasks/Dockerfile
    environment:
      TASKS_HTTP_ADDR: :8083
      TASKS_GRPC_ADDR: :9083
      TASKS_DB_URL: postgres://${POSTGRES_USER:-teamos}:${POSTGRES_PASSWORD:-teamos}@postgres:5432/teamos_tasks?sslmode=disable
      TASKS_NATS_URL: nats://nats:4222
      TASKS_JWT_PUBLIC_KEY: ${GATEWAY_JWT_PUBLIC_KEY:-development-key-not-generated}
      TASKS_JWT_ISSUER: ${COMPANY_JWT_ISSUER:-teamos-company}
      TASKS_JWT_AUDIENCE: ${COMPANY_JWT_AUDIENCE:-teamos-api}
      TASKS_SHUTDOWN_TIMEOUT: ${TASKS_SHUTDOWN_TIMEOUT:-30s}
    ports:
      - "8083:8083"
      - "127.0.0.1:9083:9083"
    depends_on:
      tasks-migrate:
        condition: service_completed_successfully
      nats-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/tasks", "healthcheck", "http://127.0.0.1:8083/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
    stop_grace_period: 30s
    init: true

  academy:
    build:
      context: ..
      dockerfile: services/academy/Dockerfile
    environment:
      ACADEMY_HTTP_ADDR: :8084
      ACADEMY_GRPC_ADDR: :9084
      ACADEMY_DB_URL: postgres://${POSTGRES_USER:-teamos}:${POSTGRES_PASSWORD:-teamos}@postgres:5432/teamos_academy?sslmode=disable
      ACADEMY_NATS_URL: nats://nats:4222
      ACADEMY_KB_GRPC_ADDR: kb:9082
      ACADEMY_COMPANY_GRPC_ADDR: company:9081
      ACADEMY_FILES_GRPC_ADDR: files:9086
      ACADEMY_EXTERNAL_TOKEN_SECRET: ${ACADEMY_EXTERNAL_TOKEN_SECRET:-development-academy-external-secret-change-me}
      ACADEMY_EXTERNAL_EMAIL_KEY: ${ACADEMY_EXTERNAL_EMAIL_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      ACADEMY_EXTERNAL_EMAIL_KEY_ID: ${ACADEMY_EXTERNAL_EMAIL_KEY_ID:-v1}
      ACADEMY_JWT_PUBLIC_KEY: ${GATEWAY_JWT_PUBLIC_KEY:-development-key-not-generated}
      ACADEMY_JWT_ISSUER: ${COMPANY_JWT_ISSUER:-teamos-company}
      ACADEMY_JWT_AUDIENCE: ${COMPANY_JWT_AUDIENCE:-teamos-api}
      ACADEMY_SHUTDOWN_TIMEOUT: ${ACADEMY_SHUTDOWN_TIMEOUT:-30s}
    ports:
      - "8084:8084"
      - "127.0.0.1:9084:9084"
    depends_on:
      academy-migrate:
        condition: service_completed_successfully
      nats-init:
        condition: service_completed_successfully
      kb:
        condition: service_healthy
      company:
        condition: service_healthy
      files:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/academy", "healthcheck", "http://127.0.0.1:8084/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
    stop_grace_period: 30s
    init: true

  notifications:
    build:
      context: ..
      dockerfile: services/notifications/Dockerfile
    environment:
      NOTIFICATIONS_HTTP_ADDR: :8085
      NOTIFICATIONS_GRPC_ADDR: :9085
      NOTIFICATIONS_DB_URL: postgres://${POSTGRES_USER:-teamos}:${POSTGRES_PASSWORD:-teamos}@postgres:5432/teamos_notifications?sslmode=disable
      NOTIFICATIONS_NATS_URL: nats://nats:4222
      NOTIFICATIONS_EXTERNAL_EMAIL_KEY: ${ACADEMY_EXTERNAL_EMAIL_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      NOTIFICATIONS_EXTERNAL_EMAIL_KEY_ID: ${ACADEMY_EXTERNAL_EMAIL_KEY_ID:-v1}
      NOTIFICATIONS_EMAIL_PROVIDER: ${NOTIFICATIONS_EMAIL_PROVIDER:-log}
      NOTIFICATIONS_JWT_PUBLIC_KEY: ${GATEWAY_JWT_PUBLIC_KEY:-development-key-not-generated}
      NOTIFICATIONS_JWT_ISSUER: ${COMPANY_JWT_ISSUER:-teamos-company}
      NOTIFICATIONS_JWT_AUDIENCE: ${COMPANY_JWT_AUDIENCE:-teamos-api}
    ports: ["8085:8085", "127.0.0.1:9085:9085"]
    depends_on:
      notifications-migrate:
        condition: service_completed_successfully
      nats-init:
        condition: service_completed_successfully
    stop_grace_period: 30s
    init: true

  files:
    build:
      context: ..
      dockerfile: services/files/Dockerfile
    environment:
      FILES_HTTP_ADDR: :8086
      FILES_GRPC_ADDR: :9086
      FILES_TRUSTED_METADATA: "true"
      FILES_DB_URL: postgres://${POSTGRES_USER:-teamos}:${POSTGRES_PASSWORD:-teamos}@postgres:5432/teamos_files?sslmode=disable
      FILES_JWT_PUBLIC_KEY: ${GATEWAY_JWT_PUBLIC_KEY:-development-key-not-generated}
      FILES_JWT_ISSUER: ${COMPANY_JWT_ISSUER:-teamos-company}
      FILES_JWT_AUDIENCE: ${COMPANY_JWT_AUDIENCE:-teamos-api}
      FILES_S3_ENDPOINT: minio:9000
      FILES_S3_PUBLIC_ENDPOINT: ${FILES_S3_PUBLIC_ENDPOINT:-localhost:9000}
      FILES_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-teamos-minio}
      FILES_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-teamos-minio-secret}
      FILES_S3_BUCKET: ${FILES_S3_BUCKET:-teamos-files}
      FILES_S3_REGION: ${FILES_S3_REGION:-us-east-1}
      FILES_S3_SECURE: "false"
      FILES_S3_CREATE_BUCKET: "true"
      FILES_MAX_SIZE_BYTES: ${FILES_MAX_SIZE_BYTES:-26214400}
      FILES_DOWNLOAD_URL_TTL: ${FILES_DOWNLOAD_URL_TTL:-15m}
      FILES_SHUTDOWN_TIMEOUT: ${FILES_SHUTDOWN_TIMEOUT:-30s}
    ports: ["8086:8086", "127.0.0.1:9086:9086"]
    depends_on:
      files-migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/files", "healthcheck", "http://127.0.0.1:8086/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
    stop_grace_period: 30s
    init: true

  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    environment:
      GATEWAY_HTTP_ADDR: :8080
      GATEWAY_COMPANY_GRPC_ADDR: company:9081
      GATEWAY_KB_GRPC_ADDR: kb:9082
      GATEWAY_TASKS_GRPC_ADDR: tasks:9083
      GATEWAY_ACADEMY_GRPC_ADDR: academy:9084
      GATEWAY_NOTIFICATIONS_GRPC_ADDR: notifications:9085
      GATEWAY_FILES_GRPC_ADDR: files:9086
      GATEWAY_JWT_PUBLIC_KEY: ${GATEWAY_JWT_PUBLIC_KEY:-development-key-not-generated}
      GATEWAY_JWT_ISSUER: ${GATEWAY_JWT_ISSUER:-teamos-company}
      GATEWAY_JWT_AUDIENCE: ${GATEWAY_JWT_AUDIENCE:-teamos-api}
      GATEWAY_CORS_ORIGINS: ${GATEWAY_CORS_ORIGINS:-http://localhost:5173}
      GATEWAY_PUBLIC_APP_URL: ${GATEWAY_PUBLIC_APP_URL:-http://localhost:5173}
      GATEWAY_TRUSTED_PROXY_CIDRS: ${GATEWAY_TRUSTED_PROXY_CIDRS:-}
      GATEWAY_COOKIE_SECURE: ${GATEWAY_COOKIE_SECURE:-false}
      GATEWAY_ACADEMY_LEGACY_WRITES_READ_ONLY: ${GATEWAY_ACADEMY_LEGACY_WRITES_READ_ONLY:-false}
      GATEWAY_SHUTDOWN_TIMEOUT: ${GATEWAY_SHUTDOWN_TIMEOUT:-30s}
    ports:
      - "8080:8080"
    depends_on:
      company:
        condition: service_healthy
      kb:
        condition: service_healthy
      tasks:
        condition: service_healthy
      academy:
        condition: service_healthy
      notifications:
        condition: service_started
      files:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/gateway", "healthcheck", "http://127.0.0.1:8080/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
    stop_grace_period: 30s
    init: true

volumes:
  postgres-data:
  nats-data:
  minio-data:
