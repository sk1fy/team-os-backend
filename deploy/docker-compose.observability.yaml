services:
  gateway:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      otel-collector:
        condition: service_started
  company:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  kb:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  tasks:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  academy:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  notifications:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  files:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318

  prometheus:
    image: prom/prometheus:v3.4.2
    profiles: [observability]
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus", "--web.enable-remote-write-receiver"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports: ["9090:9090"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.0.2
    profiles: [observability]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-teamos-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports: ["3000:3000"]
    depends_on: [prometheus, loki, tempo]
    restart: unless-stopped

  loki:
    image: grafana/loki:3.5.1
    profiles: [observability]
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./observability/loki.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    ports: ["3100:3100"]
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.5.1
    profiles: [observability]
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./observability/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on: [loki]
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.8.1
    profiles: [observability]
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./observability/tempo.yml:/etc/tempo/config.yml:ro
      - tempo-data:/var/tempo
    ports: ["3200:3200"]
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.128.0
    profiles: [observability]
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./observability/otel-collector.yml:/etc/otelcol/config.yml:ro
    ports: ["4317:4317", "4318:4318", "8889:8889"]
    depends_on: [tempo]
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:
